<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Shukla | Video Editor and Copywriter</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Segoe UI, Arial, sans-serif;
    background: #0a0a0a;
    color: #d1d5db;
    line-height: 1.7;
    overflow-x: hidden;
}
* { box-sizing: border-box; scroll-behavior: smooth; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; }

.wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
.center { text-align: center; }

/* NAV */
.nav {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid #1a1a1a;
}
.nav-inner {
    max-width: 1000px; margin: 0 auto; padding: 0 20px;
    display: flex; justify-content: space-between; align-items: center; height: 60px;
}
.nav-logo { font-size: 24px; font-weight: 900; color: #f97316; }
.nav-logo span { color: #ec4899; }
.nav-links { display: flex; gap: 25px; align-items: center; }
.nav-links a { color: #9ca3af; font-size: 14px; font-weight: 500; }
.nav-links a:hover { color: #fff; }
.nav-hire {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: #fff !important; padding: 8px 22px; border-radius: 50px;
    font-weight: 700 !important; font-size: 13px !important;
}
.mob-btn {
    display: none; background: none; border: none;
    color: #fff; font-size: 26px; cursor: pointer;
}
.mob-menu {
    display: none; background: rgba(10,10,10,0.98);
    position: absolute; top: 60px; left: 0; width: 100%;
    padding: 15px 20px; border-bottom: 1px solid #1a1a1a;
}
.mob-menu.show { display: block; }
.mob-menu a {
    display: block; padding: 12px 15px; color: #9ca3af;
    font-size: 15px; border-radius: 8px;
}
.mob-menu a:hover { background: #111; color: #fff; }
@media(max-width:768px) {
    .nav-links { display: none; }
    .mob-btn { display: block; }
}

/* HERO */
.hero {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; text-align: center;
    padding: 100px 20px 60px; position: relative; overflow: hidden;
}
.hero-bg1 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: #f97316; filter: blur(150px); opacity: 0.08;
    top: 10%; left: -10%;
}
.hero-bg2 {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    background: #8b5cf6; filter: blur(150px); opacity: 0.08;
    bottom: 10%; right: -10%;
}
.hero-content { position: relative; z-index: 2; max-width: 700px; }
.avatar-ring {
    display: inline-block; padding: 5px; border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    margin-bottom: 25px;
}
.avatar-circle {
    width: 130px; height: 130px; border-radius: 50%;
    background: #1a1a1a; display: flex; align-items: center;
    justify-content: center; font-size: 48px; font-weight: 900;
    color: #fff; border: 4px solid #0a0a0a;
}
.hero-label {
    color: #f97316; font-size: 13px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px;
}
.hero-name {
    font-size: 52px; font-weight: 900; color: #fff;
    margin: 0 0 5px; line-height: 1.1;
}
.hero-name span {
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-role {
    font-size: 20px; color: #9ca3af; font-weight: 300;
    margin-bottom: 15px; min-height: 32px;
}
.hero-role .cursor {
    display: inline-block; width: 3px; height: 24px;
    background: #f97316; margin-left: 3px; vertical-align: text-bottom;
    animation: blink 0.7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.hero-tagline { font-size: 17px; color: #d1d5db; margin-bottom: 8px; }
.hero-sub { font-size: 14px; color: #6b7280; margin-bottom: 35px; }
.hero-btns { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; }
.btn1 {
    padding: 15px 35px; border-radius: 50px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: #fff; font-weight: 700; font-size: 16px;
    box-shadow: 0 6px 25px rgba(249,115,22,0.25);
}
.btn1:hover { box-shadow: 0 10px 35px rgba(249,115,22,0.35); }
.btn2 {
    padding: 15px 35px; border-radius: 50px; cursor: pointer;
    background: transparent; color: #fff; font-weight: 700;
    font-size: 16px; border: 2px solid #333;
}
.btn2:hover { background: rgba(255,255,255,0.04); border-color: #555; }
.hero-stats { display: flex; justify-content: center; gap: 45px; }
.stat-num { font-size: 30px; font-weight: 900; color: #fff; display: block; }
.stat-lbl { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 2px; }
@media(max-width:768px) {
    .hero-name { font-size: 36px; }
    .hero-stats { gap: 25px; }
    .hero-btns { flex-direction: column; align-items: center; }
}

/* SECTIONS */
.sec { padding: 90px 0; position: relative; }
.sec-alt { background: rgba(17,24,39,0.3); }
.sec-label {
    color: #f97316; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;
}
.sec-title {
    font-size: 34px; font-weight: 900; color: #fff; margin: 0 0 15px;
}
.sec-title span {
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sec-desc { color: #6b7280; max-width: 480px; margin: 0 auto 50px; font-size: 15px; }

/* 2-COL GRID */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; align-items: center; }
@media(max-width:768px) { .g2 { grid-template-columns: 1fr; gap: 40px; } }

/* CODE CARD */
.code-box {
    background: linear-gradient(135deg, #111, #1a1a2e);
    border: 1px solid #1e1e1e; border-radius: 16px; padding: 30px;
    font-family: Consolas, monospace; font-size: 13px; line-height: 2.2;
}
.c-gray { color: #555; } .c-pink { color: #f472b6; }
.c-blue { color: #93c5fd; } .c-green { color: #4ade80; }
.c-orange { color: #fb923c; } .c-purple { color: #a78bfa; }
.c-yellow { color: #fbbf24; }

/* INFO GRID */
.info-g { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px; }
.info-box {
    background: rgba(15,15,15,0.8); border: 1px solid #1e1e1e;
    border-radius: 12px; padding: 15px;
}
.info-box:hover { border-color: #f9731640; }
.info-i { font-size: 20px; margin-bottom: 5px; }
.info-l { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.info-v { color: #fff; font-weight: 700; font-size: 14px; }

.about-p { color: #9ca3af; font-size: 15px; margin-bottom: 14px; line-height: 1.8; }
.about-p b { color: #fff; }
.about-p em { color: #f97316; font-style: normal; font-weight: 600; }

/* SKILL CARDS */
.sk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; max-width: 900px; margin: 0 auto; }
@media(max-width:768px) { .sk-grid { grid-template-columns: 1fr; } }
.sk-card {
    background: rgba(15,15,15,0.7); border: 1px solid #1e1e1e;
    border-radius: 16px; padding: 25px; transition: transform 0.3s;
}
.sk-card:hover { transform: translateY(-5px); }
.sk-top { display: flex; align-items: center; gap: 15px; margin-bottom: 14px; }
.sk-icon {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.sk-i-or { background: linear-gradient(135deg, #f97316, #ef4444); }
.sk-i-pu { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.sk-i-cy { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
.sk-i-ye { background: linear-gradient(135deg, #eab308, #f97316); }
.sk-name { font-size: 17px; font-weight: 700; color: #fff; }
.sk-sub { font-size: 11px; color: #666; }
.sk-desc { font-size: 14px; color: #888; margin-bottom: 16px; }
.sk-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 7px; }
.sk-row span:first-child { color: #ccc; }
.sk-barbg { width: 100%; height: 10px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
.sk-bar { height: 100%; border-radius: 10px; width: 0; transition: width 1.5s ease-out; }
.b-or { background: linear-gradient(90deg, #f97316, #ef4444); }
.b-pu { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
.b-cy { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
.b-ye { background: linear-gradient(90deg, #eab308, #f97316); }

.tools { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 50px; }
.tool
