<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Shukla | Video Editor & Copywriter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', Arial, Helvetica, sans-serif;
    background-color: #0a0a0a;
    color: #e0e0e0;
    overflow-x: hidden;
    line-height: 1.6;
}

a {
    text-decoration: none;
    color: inherit;
}

ul {
    list-style: none;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

/* ====== UTILITY CLASSES ====== */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

.section {
    padding: 100px 0;
    position: relative;
}

.section-label {
    color: #f97316;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
}

.section-title {
    font-size: 36px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 20px;
}

.gradient-text {
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.text-center {
    text-align: center;
}

.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    align-items: center;
}

.grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 25px;
}

/* ====== ANIMATIONS ====== */
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

@keyframes fillBar {
    from { width: 0%; }
    to { width: var(--level); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes particleRise {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.floating { animation: float 4s ease-in-out infinite; }

.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

.skill-fill {
    animation: fillBar 1.8s ease-out forwards;
}

/* ====== PARTICLES ====== */
#particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.particle {
    position: absolute;
    width: 3px; height: 3px;
    background: rgba(249, 115, 22, 0.3);
    border-radius: 50%;
    animation: particleRise linear infinite;
}

/* ====== BLOBS ====== */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.1;
    pointer-events: none;
    z-index: 0;
}

.blob-orange { background: #f97316; }
.blob-purple { background: #8b5cf6; }
.blob-pink { background: #ec4899; }

/* ====== NAVBAR ====== */
.navbar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    z-index: 1000;
    transition: all 0.4s ease;
    padding: 0 20px;
}

.navbar.scrolled {
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 65px;
}

.nav-logo {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 30px;
}

.nav-links a {
    color: #9ca3af;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s;
    position: relative;
}

.nav-links a:hover { color: #ffffff; }

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 0;
    width: 0; height: 2px;
    background: #f97316;
    transition: width 0.3s;
}

.nav-links a:hover::after,
.nav-links a.active::after {
    width: 100%;
}

.nav-hire {
    padding: 10px 24px;
    border-radius: 50px;
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: #fff !important;
    font-weight: 600 !important;
    font-size: 13px !important;
    box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
    transition: all 0.3s !important;
}

.nav-hire:hover {
    box-shadow: 0 4px 30px rgba(249, 115, 22, 0.5);
    transform: translateY(-2px);
}

.nav-hire::after { display: none !important; }

/* Mobile Menu */
.mobile-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
}

.mobile-menu {
    display: none;
    position: absolute;
    top: 65px; left: 0;
    width: 100%;
    background: rgba(10, 10, 10, 0.98);
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.mobile-menu.open { display: block; }

.mobile-menu a {
    display: block;
    padding: 12px 16px;
    color: #9ca3af;
    font-size: 15px;
    border-radius: 8px;
    transition: all 0.3s;
}

.mobile-menu a:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

/* ====== HERO ====== */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-top: 80px;
    position: relative;
}

.hero-content {
    position: relative;
    z-index: 10;
    max-width: 800px;
    padding: 0 20px;
}

.avatar-wrapper {
    margin-bottom: 30px;
    display: inline-block;
}

.avatar-glow {
    position: relative;
    display: inline-block;
}

.avatar-glow::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    filter: blur(15px);
    opacity: 0.5;
}

.avatar {
    position: relative;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 800;
    color: white;
    border: 4px solid #0a0a0a;
}

.hero-greeting {
    color: #f97316;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 15px;
}

.hero-name {
    font-size: 60px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 10px;
}

.hero-role {
    font-size: 22px;
    color: #9ca3af;
    font-weight: 300;
    margin-bottom: 20px;
    min-height: 35px;
}

.typing-cursor {
    display: inline-block;
    width: 3px;
    height: 1.1em;
    background: #f97316;
    margin-left: 4px;
    vertical-align: text-bottom;
    animation: blink 0.8s infinite;
}

.hero-desc {
    font-size: 17px;
    color: #d1d5db;
    margin-bottom: 10px;
}

.hero-sub {
    font-size: 15px;
    color: #6b7280;
    margin-bottom: 40px;
}

.hero-buttons {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 50px;
}

.btn-primary {
    padding: 16px 36px;
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
    font-weight: 700;
    font-size: 16px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(249, 115, 22, 0.3);
    transition: all 0.3s;
    display: inline-block;
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(249, 115, 22, 0.4);
}

.btn-secondary {
    padding: 16px 36px;
    background: transparent;
    color: white;
    font-weight: 700;
    font-size: 16px;
    border-radius: 50px;
    border: 2px solid #374151;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-block;
}

.btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    border-color: #6b7280;
    transform: translateY(-3px);
}

.hero-stats {
    display: flex;
    justify-content: center;
    gap: 50px;
}

.stat-item {
    text-align: center;
}

.stat-number {
    font-size: 32px;
    font-weight: 800;
    color: white;
}

.stat-label {
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.scroll-down {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #4b5563;
    font-size: 24px;
    animation: float 2s ease-in-out infinite;
}

/* ====== ABOUT ====== */
.code-card {
    background: linear-gradient(135deg, #111827, #1f2937);
    border-radius: 16px;
    padding: 30px;
    border: 1px solid #1f2937;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 2;
    position: relative;
}

.code-card::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(139,92,246,0.15));
    filter: blur(20px);
    z-index: -1;
}

.code-comment { color: #6b7280; }
.code-keyword { color: #f472b6; }
.code-var { color: #93c5fd; }
.code-key { color: #4ade80; }
.code-string { color: #fb923c; }
.code-bool { color: #a78bfa; }
.code-yellow { color: #fbbf24; }

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 30px;
}

.info-card {
    background: rgba(17, 24, 39, 0.6);
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #1f2937;
    transition: all 0.3s;
}

.info-card:hover {
    border-color: rgba(249, 115, 22, 0.3);
}

.info-icon {
    font-size: 18px;
    margin-bottom: 6px;
}

.info-label {
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.info-value {
    color: white;
    font-weight: 600;
    font-size: 14px;
}

.about-text {
    color: #9ca3af;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 15px;
}

.highlight {
    color: #f97316;
    font-weight: 600;
}

.text-white-bold {
    color: white;
    font-weight: 700;
}

/* ====== SKILLS ====== */
.skill-card {
    background: rgba(17, 24, 39, 0.6);
    padding: 28px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    transition: all 0.3s;
}

.skill-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(249, 115, 22, 0.08);
}

.skill-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.skill-icon {
    width: 56px; height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
}

.icon-orange { background: linear-gradient(135deg, #f97316, #ef4444); }
.icon-purple { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.icon-cyan { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
.icon-yellow { background: linear-gradient(135deg, #eab308, #f97316); }

.skill-name {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

.skill-sub {
    font-size: 12px;
    color: #6b7280;
}

.skill-desc {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 18px;
    line-height: 1.6;
}

.skill-bar-wrapper {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
}

.skill-bar-label { color: #d1d5db; }

.skill-bar-bg {
    width: 100%;
    height: 10px;
    background: #1f2937;
    border-radius: 10px;
    overflow: hidden;
}

.skill-bar {
    height: 100%;
    border-radius: 10px;
}

.bar-orange { background: linear-gradient(90deg, #f97316, #ef4444); }
.bar-purple { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
.bar-cyan { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
.bar-yellow { background: linear-gradient(90deg, #eab308, #f97316); }

.tools-section {
    margin-top: 60px;
    text-align: center;
}

.tools-label {
    color: #6b7280;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 25px;
}

.tools-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

.tool-tag {
    padding: 10px 20px;
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 50px;
    font-size: 13px;
    color: #d1d5db;
    transition: all 0.3s;
}

.tool-tag:hover {
    border-color: rgba(249, 115, 22, 0.4);
    color: #f97316;
}

/* ====== SERVICES ====== */
.service-card {
    background: rgba(17, 24, 39, 0.6);
    padding: 35px 25px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    text-align: center;
    transition: all 0.3s;
}

.service-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 50px rgba(249, 115, 22, 0.08);
    border-color: rgba(249, 115, 22, 0.2);
}

.service-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.3s;
}

.si-orange { background: rgba(249, 115, 22, 0.15); }
.si-purple { background: rgba(139, 92, 246, 0.15); }
.si-cyan { background: rgba(6, 182, 212, 0.15); }

.service-card:hover .si-orange { background: linear-gradient(135deg, #f97316, #ef4444); }
.service-card:hover .si-purple { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.service-card:hover .si-cyan { background: linear-gradient(135deg, #06b6d4, #3b82f6); }

.service-title {
    font-size: 20px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
}

.service-desc {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.6;
}

.service-price {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #1f2937;
    font-weight: 700;
    font-size: 15px;
}

.price-orange { color: #f97316; }
.price-purple { color: #8b5cf6; }
.price-cyan { color: #06b6d4; }

/* ====== JOURNEY / TIMELINE ====== */
.timeline {
    position: relative;
    margin-left: 20px;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, #f97316, #8b5cf6, #06b6d4);
}

.timeline-item {
    margin-left: 40px;
    margin-bottom: 40px;
    position: relative;
}

.timeline-dot {
    position: absolute;
    left: -40px;
    top: 8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 4px solid #0a0a0a;
}

.dot-orange { background: #f97316; }
.dot-purple { background: #8b5cf6; }
.dot-pink { background: #ec4899; }
.dot-green { background: #22c55e; animation: pulse 2s infinite; }

.timeline-card {
    background: rgba(17, 24, 39, 0.6);
    padding: 24px;
    border-radius: 12px;
    border: 1px solid #1f2937;
    transition: all 0.3s;
}

.timeline-card:hover {
    border-color: rgba(249, 115, 22, 0.3);
}

.timeline-card-green {
    background: linear-gradient(135deg, rgba(17,24,39,0.6), rgba(22,101,52,0.1));
    border-color: rgba(34, 197, 94, 0.3);
}

.timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 8px;
}

.timeline-title {
    font-size: 17px;
    font-weight: 700;
    color: white;
}

.timeline-date {
    font-size: 11px;
    font-family: monospace;
    padding: 4px 12px;
    border-radius: 50px;
    background: rgba(249, 115, 22, 0.1);
    color: #f97316;
}

.date-purple { background: rgba(139,92,246,0.1); color: #8b5cf6; }
.date-pink { background: rgba(236,72,153,0.1); color: #ec4899; }
.date-green { background: rgba(34,197,94,0.1); color: #22c55e; animation: pulse 2s infinite; }

.timeline-text {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.6;
}

/* ====== QUOTE ====== */
.quote-section {
    padding: 80px 20px;
    position: relative;
    overflow: hidden;
}

.quote-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(249,115,22,0.08), rgba(236,72,153,0.08), rgba(139,92,246,0.08));
}

.quote-content {
    position: relative;
    z-index: 10;
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
}

.quote-icon {
    font-size: 40px;
    color: rgba(249, 115, 22, 0.25);
    margin-bottom: 20px;
}

.quote-text {
    font-size: 28px;
    font-weight: 700;
    color: white;
    line-height: 1.4;
    margin-bottom: 20px;
}

.quote-author {
    color: #6b7280;
    font-weight: 500;
}

/* ====== CONTACT ====== */
.contact-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
}

.contact-card {
    background: rgba(17, 24, 39, 0.6);
    padding: 28px 20px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    text-align: center;
    transition: all 0.3s;
}

.contact-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(249, 115, 22, 0.08);
}

.contact-icon {
    width: 56px; height: 56px;
    border-radius: 12px;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.3s;
}

.ci-orange { background: rgba(249,115,22,0.1); }
.ci-purple { background: rgba(139,92,246,0.1); }
.ci-cyan { background: rgba(6,182,212,0.1); }

.contact-card:hover .ci-orange { background: #f97316; }
.contact-card:hover .ci-purple { background: #8b5cf6; }
.contact-card:hover .ci-cyan { background: #06b6d4; }

.contact-title {
    font-size: 16px;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
}

.contact-info {
    font-size: 12px;
    color: #9ca3af;
    word-break: break-all;
}

.cta-box {
    background: linear-gradient(135deg, #111827, #1f2937);
    border-radius: 16px;
    border: 1px solid #1f2937;
    padding: 50px 30px;
    text-align: center;
}

.cta-title {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
}

.cta-text {
    color: #9ca3af;
    font-size: 15px;
    margin-bottom: 30px;
    max-width: 450px;
    margin-left: auto;
    margin-right: auto;
}

.cta-btn {
    display: inline-block;
    padding: 18px 40px;
    background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
    background-size: 200% 200%;
    animation: gradientMove 3s ease infinite;
    color: white;
    font-weight: 700;
    font-size: 16px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(249, 115, 22, 0.3);
    transition: all 0.3s;
}

.cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(249, 115, 22, 0.5);
}

/* ====== FOOTER ====== */
.footer {
    border-top: 1px solid #1f2937;
    padding: 25px 20px;
    text-align: center;
}

.footer-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.footer-text {
    font-size: 13px;
    color: #6b7280;
}

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
    .nav-links { display: none; }
    .mobile-btn { display: block; }

    .hero-name { font-size: 38px; }
    .hero-role { font-size: 18px; }

    .grid-2 { grid-template-columns: 1fr; gap: 40px; }
    .grid-3 { grid-template-columns: 1fr; }
    .contact-cards { grid-template-columns: 1fr; }

    .section-title { font-size: 28px; }
    .hero-stats { gap: 25px; }
    .stat-number { font-size: 26px; }
